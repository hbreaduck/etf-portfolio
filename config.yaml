# ── ETF 포트폴리오 수집·배분 설정 ──────────────────────────────────────────────

# 섹터 분류 (GICS 순수)
sector_classification: GICS
tech_group:
  - Information Technology        # IT만 테크로 인정

sector_targets:
  tech:  0.50
  other: 0.45                     # 자유 버킷 — 서브캡 없이 스코어 상위로 채움
  cash:  0.05

# 종목 선정·스코어
scoring: equal                    # 3개 ETF 비중 단순합산 (옵션: aum_weighted)
target_names: 15
name_cap:   0.10                  # 종목당 상한
name_floor: 0.02                  # 종목당 하한
rebalance_threshold: 0.005        # 비중변화 0.5%p 미만은 '유지'

# 경로 설정
etf_radar:
  compare_period: daily        # daily | weekly
  min_change_pct: 0.5          # Δ%p 미만 변동은 레이더에서 제외

performance:
  benchmark: QQQ          # 벤치마크 티커 (NASDAQ 100 ETF)

paths:
  raw_dir:       data/raw
  snapshot:      data/snapshots/holdings.parquet
  sector_map:    sector_map.csv
  output_dir:    output
  portfolio_dir: data/portfolios
  log_dir:       logs
  diff_history:  data/diff_history.parquet
  perf_history:  data/perf_history.parquet
